<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Seite nicht gefunden | SD Nightshift Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
                    colors: { primary: '#5397EA' }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body class="font-sans antialiased text-slate-900 bg-white flex flex-col min-h-screen">

    <header class="w-full bg-white border-b border-slate-100 py-4">
        <div class="max-w-6xl mx-auto px-6 flex justify-center">
            <a href="index.html" class="flex items-center gap-3 text-2xl font-bold tracking-tight">
                <img src="assets/images/logo.png" alt="SD Logo" class="w-10 h-10">
                <span>Nightshift Studio</span>
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center relative overflow-hidden">
        <!-- Dezenter Hintergrund-Glow für den Nightshift Look -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-blue-50 rounded-full blur-[100px] -z-10"></div>

        <div class="text-center px-6">
            <div class="inline-flex p-4 bg-blue-50 rounded-3xl mb-6 text-primary">
                <i data-lucide="map-pin-off" class="w-12 h-12"></i>
            </div>
            <h1 class="text-6xl md:text-8xl font-black text-slate-900 mb-4">404</h1>
            <h2 class="text-2xl md:text-3xl font-bold text-slate-800 mb-6">Hoppla! Hier ist es zappenduster.</h2>
            <p class="text-slate-500 mb-10 max-w-md mx-auto leading-relaxed">
                Die Seite, die du suchst, scheint in eine andere Dimension verschwunden zu sein oder existiert gar nicht.
            </p>
            <a href="index.html" class="inline-flex bg-primary hover:bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold items-center gap-3 transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                <i data-lucide="home" class="w-5 h-5"></i>
                Zurück zur Startseite
            </a>
        </div>
    </main>

    <footer class="w-full py-8 text-center text-sm text-slate-400">
        © 2026 SD Nightshift Studio
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
